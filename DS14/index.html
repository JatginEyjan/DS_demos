<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DS14 - 深渊回响</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👁️</text></svg>">
</head>
<body>
    <div id="game-container">
        <!-- 村庄界面 -->
        <div id="village-screen" class="screen">
            <h1>🏘️ 边缘村庄</h1>
            <div class="village-stats">
                <span>💰 金钱: <span id="village-money">0</span></span>
            </div>
            
            <div class="shop-section">
                <h2>🛒 商店</h2>
                <div id="shop-items"></div>
            </div>
            
            <div class="backpack-section">
                <h2>🎒 背包配置 (<span id="village-backpack-count">0</span>/<span id="village-backpack-max">5</span>)</h2>
                <div class="backpack-grid" id="village-backpack-grid">
                    <!-- 背包格子将在这里生成 -->
                </div>
                <div class="backpack-actions">
                    <button id="equip-radar-btn" class="btn">装备雷达</button>
                    <button id="equip-pickaxe-btn" class="btn">更换镐子</button>
                    <button id="buy-consumable-btn" class="btn">购买消耗品</button>
                    <button id="clear-backpack-btn" class="btn warning">清空背包</button>
                </div>
                <p class="backpack-warning" id="backpack-warning"></p>
            </div>
            
            <button id="enter-dungeon-btn" class="btn success">⚔️ 进入地牢</button>
        </div>

        <!-- 地牢界面 -->
        <div id="dungeon-screen" class="screen hidden">
            <!-- 状态栏 -->
        <div id="status-bar">
            <div class="stat">
                <span class="stat-label">HP</span>
                <div class="stat-bar"><div id="hp-bar" class="bar-fill"></div></div>
                <span id="hp-value">100/100</span>
            </div>
            <div class="stat">
                <span class="stat-label">SAN</span>
                <div class="stat-bar"><div id="san-bar" class="bar-fill sanity"></div></div>
                <span id="san-value">100/100</span>
            </div>
            <div class="stat">
                <span class="stat-label">氧气</span>
                <span id="oxygen-value">20</span>
            </div>
            <div class="stat">
                <span class="stat-label">回合</span>
                <span id="turn-value">1</span>
            </div>
            <div class="stat">
                <span class="stat-label">房间</span>
                <span id="room-value">1</span>
            </div>
            <div class="stat">
                <span class="stat-label">🗝️</span>
                <span id="key-value">0</span>
            </div>
        </div>

        <!-- 地牢网格 -->
        <div id="dungeon-grid"></div>

        <!-- 控制按钮 -->
        <div id="controls">
            <button id="radar-btn" class="btn">📡 雷达扫描</button>
            <button id="retreat-btn" class="btn warning">🏃 撤退</button>
            <button id="debug-btn" class="btn secondary">🐛 调试</button>
        </div>
        
        <!-- 调试日志面板 -->
        <div id="debug-panel" class="hidden">
            <h3>调试日志</h3>
            <div id="debug-content"></div>
            <button id="clear-debug-btn" class="btn secondary">清除日志</button>
        </div>

        <!-- 雷达扫描结果 -->
        <div id="radar-display" class="hidden">
            <h3>雷达扫描结果</h3>
            <div id="radar-content"></div>
        </div>

        <!-- 日志 -->
        <div id="log-panel">
            <div class="log-entry">欢迎来到DS14 - 深渊回响</div>
            <div class="log-entry">点击墙体进行挖掘，寻找通往下一层的门...</div>
        </div>

        <!-- 避难所界面 -->
        <div id="sanctuary-modal" class="modal hidden">
            <div class="modal-content">
                <h2>🏠 避难所</h2>
                <p>你找到了一个安全的避难所。</p>
                <p>在这里你可以恢复状态，或者选择完全撤离。</p>
                <div class="modal-actions">
                    <button id="rest-btn" class="btn">休息恢复</button>
                    <button id="full-retreat-btn" class="btn success">完全撤离</button>
                    <button id="continue-btn" class="btn secondary">继续探索</button>
                </div>
            </div>
        </div>

        <!-- 游戏结束 -->
        <div id="game-over-modal" class="modal hidden">
            <div class="modal-content">
                <h2 id="game-over-title">游戏结束</h2>
                <p id="game-over-reason"></p>
                <button id="restart-btn" class="btn">重新开始</button>
            </div>
        </div>
    </div>

    <script src="audio.js"></script>
    <script src="dungeon.js"></script>
    <script src="game.js"></script>
</body>
</html>
